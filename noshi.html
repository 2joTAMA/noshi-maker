<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熨斗メーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:#f5f5f3;min-height:100vh;padding:16px;}
h1{font-size:16px;font-weight:500;color:#333;margin-bottom:16px;letter-spacing:0.05em;}
.layout{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
.panel{background:white;border:1px solid #ddd;border-radius:12px;padding:16px;width:240px;flex-shrink:0;}
.preview-wrap{flex:1;min-width:280px;}
.sec{margin-bottom:14px;}
.lbl{font-size:11px;color:#888;display:block;margin-bottom:6px;letter-spacing:0.04em;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.opt{background:#f5f5f3;border:1px solid #ddd;border-radius:8px;padding:9px 4px;font-size:13px;cursor:pointer;color:#333;text-align:center;line-height:1.4;font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;-webkit-tap-highlight-color:transparent;}
.opt.on{background:#e8f0fe;border-color:#7baaf7;color:#1a56cc;}
textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px;font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-size:14px;resize:vertical;min-height:72px;color:#333;background:white;}
.hint{font-size:11px;color:#aaa;margin-top:4px;line-height:1.55;}
.cb-row{display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cb-row input{width:18px;height:18px;}
.cb-row span{font-size:13px;color:#333;}
.pbtn{width:100%;padding:12px;background:white;border:1px solid #bbb;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:#333;margin-top:4px;-webkit-tap-highlight-color:transparent;}
.pbtn:active{background:#f0f0f0;}
.prev-lbl{font-size:11px;color:#aaa;margin-bottom:6px;}
.prev-box{background:#e0e0dc;border-radius:8px;width:100%;aspect-ratio:420/297;display:flex;align-items:center;justify-content:center;padding:8px;}
.prev-inner{background:white;width:100%;height:100%;border:1px solid #bbb;border-radius:2px;overflow:hidden;}
.prev-inner svg{width:100%;height:100%;display:block;}
@media(max-width:560px){
  .panel{width:100%;}
  .preview-wrap{width:100%;}
}
@media print{
  @page{size:A3 landscape;margin:0;}
  html,body{margin:0;padding:0;background:white;}
  body *{visibility:hidden;}
  #pt{visibility:visible;position:fixed;inset:0;background:white;}
  #pt *{visibility:visible;}
  #pt svg{width:100vw;height:100vh;}
}
</style>
</head>
<body>
<h1>熨斗メーカー</h1>
<div class="layout">

<div class="panel">
  <div class="sec">
    <span class="lbl">表書き</span>
    <div class="grid2">
      <button class="opt on" data-v="御祝" onclick="pickOmote(this)">御祝</button>
      <button class="opt" data-v="粗品" onclick="pickOmote(this)">粗品</button>
      <button class="opt" data-v="寿" onclick="pickOmote(this)">寿</button>
      <button class="opt" data-v="御礼" onclick="pickOmote(this)">御礼</button>
      <button class="opt" data-v="祝金婚式" onclick="pickOmote(this)">祝金婚式</button>
      <button class="opt" data-v="祝御結婚" onclick="pickOmote(this)">祝御結婚</button>
    </div>
  </div>

  <div class="sec">
    <span class="lbl">贈り主の名前</span>
    <textarea id="name" placeholder="1名：山田太郎&#10;連名：1行目に1人目（右）&#10;　　　2行目に2人目（左）" oninput="render()" rows="3"></textarea>
    <p class="hint">連名は1行1名・先に書いた方が右になります（最大3名）</p>
  </div>

  <div class="sec">
    <label class="cb-row">
      <input type="checkbox" id="usumeki" onchange="render()">
      <span>薄墨で印刷する</span>
    </label>
  </div>

  <button class="pbtn" onclick="doPrint()">🖨 A3横で印刷する</button>
  <p class="hint" style="margin-top:6px;">印刷ダイアログ → 用紙A3・横向き・余白なし</p>
</div>

<div class="preview-wrap">
  <p class="prev-lbl">プレビュー（A3横 420×297mm）</p>
  <div class="prev-box">
    <div class="prev-inner" id="prev"></div>
  </div>
</div>

</div>
<div id="pt" style="display:none;"></div>

<script>
// フォント優先順
// iPad/Mac : ヒラギノ明朝 ProN W6 → W3
// Windows  : Noto Serif JP 700（Googleフォント）→ Yu Mincho
const FF = "'Hiragino Mincho ProN W6','HiraMinProN-W6','Hiragino Mincho ProN','HiraMinProN-W3','Noto Serif JP','Yu Mincho','YuMincho',serif";

// mm寸法定数（A3横 420×297mm）
const W=420, H=297, CX=W/2, CY=H/2;
const O_TOP=20,    O_BOTTOM=CY-30, O_H=O_BOTTOM-O_TOP; // 20〜118.5mm = 98.5mm
const N_TOP=CY+30, N_BOTTOM=H-20,  N_H=N_BOTTOM-N_TOP; // 178.5〜277mm = 98.5mm
const O_BASE=22, N_BASE=14;                              // 88Q=22mm, 56Q=14mm

// 字間（文字サイズに対する追加スペース比率）
// 文字数が少ないほど広く開ける
function getGap(n){
  if(n<=1) return 0;
  if(n===2) return 0.35;
  if(n===3) return 0.20;
  return 0.10;
}

// 縦方向配置計算
function calcVert(n, baseFs, availH){
  const gap  = getGap(n);
  const step = 1 + gap;
  let fs = baseFs;
  let totalH = fs * (1 + (n-1)*step);
  if(totalH > availH){
    fs = availH / (1 + (n-1)*step);
    totalH = availH;
  }
  return {fs, step, totalH};
}

let curOmote = '御祝';

function pickOmote(btn){
  document.querySelectorAll('[onclick="pickOmote(this)"]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curOmote = btn.dataset.v;
  render();
}

function makeSVG(w, h){
  const sx = w/W, sy = h/H;
  const usumeki = document.getElementById('usumeki').checked;
  const ink = usumeki ? '#888888' : '#111111';
  const nameRaw = document.getElementById('name').value.trim();
  const names = nameRaw ? nameRaw.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,3) : [];

  let els = `<rect width="${w}" height="${h}" fill="white"/>`;

  // ---- 表書き ----
  const oChars = curOmote.split('');
  const {fs:oFs, step:oStep, totalH:oTotalH} = calcVert(oChars.length, O_BASE, O_H);
  const oMidY   = (O_TOP + O_BOTTOM) / 2;
  const oStartY = oMidY - oTotalH/2;

  oChars.forEach((c, i)=>{
    const ymm = oStartY + oFs*0.85 + i*oFs*oStep;
    els += `<text x="${w/2}" y="${ymm*sy}" text-anchor="middle" `
         + `font-size="${oFs*sy}" font-weight="700" `
         + `font-family="${FF}" fill="${ink}">${c}</text>`;
  });

  // ---- 名前 ----
  if(names.length > 0){
    const maxLen = Math.max(...names.map(n=>n.length));
    const {fs:nFs, step:nStep, totalH:nTotalH} = calcVert(maxLen, N_BASE, N_H);
    const nMidY   = (N_TOP + N_BOTTOM) / 2;
    const nStartY = nMidY - nTotalH/2;

    const colGap     = nFs * 1.6;
    const totalColW  = (names.length - 1) * colGap;
    const rightmostX = CX + totalColW/2;

    names.forEach((name, ci)=>{
      const colXmm = rightmostX - ci * colGap;
      name.split('').forEach((nc, ni)=>{
        const ymm = nStartY + nFs*0.85 + ni*nFs*nStep;
        els += `<text x="${colXmm*sx}" y="${ymm*sy}" text-anchor="middle" `
             + `font-size="${nFs*sy}" font-weight="700" `
             + `font-family="${FF}" fill="${ink}">${nc}</text>`;
      });
    });
  }

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${els}</svg>`;
}

function render(){
  document.getElementById('prev').innerHTML = makeSVG(420, 297);
}

function doPrint(){
  const pt = document.getElementById('pt');
  pt.style.display = 'block';
  pt.innerHTML = makeSVG(1587, 1123);
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{ pt.style.display = 'none'; }, 2000);
  }, 200);
}

document.fonts.ready.then(()=>render());
</script>
</body>
</html>
