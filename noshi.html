<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熨斗メーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --ff-ui: -apple-system,'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;
  --ff-noshi: 'Hiragino Mincho ProN W6','HiraMinProN-W6','Hiragino Mincho ProN','Noto Serif JP','Yu Mincho',serif;
  --c-bg: #f5f4f0;
  --c-panel: #ffffff;
  --c-border: #e0ddd8;
  --c-active-bg: #e8f0fe;
  --c-active-border: #7baaf7;
  --c-active-text: #1a56cc;
  --c-muted: #999;
  --c-step-done: #2e7d32;
  --radius: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff-ui);background:var(--c-bg);min-height:100vh;padding:16px;font-size:16px;}

/* ページタイトル */
.page-title{font-size:20px;font-weight:700;color:#222;margin-bottom:20px;letter-spacing:0.03em;}

/* レイアウト：PC=横並び、タブレット以下=縦並び */
.layout{display:grid;grid-template-columns:1fr 420px;gap:20px;align-items:start;}
@media(max-width:900px){
  .layout{grid-template-columns:1fr;}
}

/* パネル */
.panel{background:var(--c-panel);border:1px solid var(--c-border);border-radius:14px;padding:20px;}

/* ステップブロック */
.step-block{margin-bottom:24px;transition:opacity .2s;}
.step-block.locked{opacity:.35;pointer-events:none;}
.step-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.step-badge{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
  background:#e0ddd8;color:#888;transition:all .2s;
}
.step-block.done .step-badge{background:var(--c-step-done);color:white;}
.step-block.active .step-badge{background:var(--c-active-border);color:white;}
.step-title{font-size:17px;font-weight:700;color:#222;}
.step-block.locked .step-title{color:#bbb;}

/* グループグリッド */
.group-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.gbtn{
  background:#faf9f7;border:1.5px solid var(--c-border);
  border-radius:var(--radius);padding:14px 8px;
  font-size:17px;font-weight:600;cursor:pointer;color:#333;
  text-align:center;line-height:1.4;
  font-family:var(--ff-ui);
  -webkit-tap-highlight-color:transparent;
  transition:all .15s;
}
.gbtn:active{transform:scale(.97);}
.gbtn.on{background:var(--c-active-bg);border-color:var(--c-active-border);color:var(--c-active-text);}
.gbtn .emoji{display:block;font-size:22px;margin-bottom:4px;}

/* 表書きグリッド */
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ibtn{
  background:#faf9f7;border:1.5px solid var(--c-border);
  border-radius:var(--radius);padding:14px 8px;
  font-size:18px;font-weight:600;cursor:pointer;color:#333;
  text-align:center;line-height:1.5;
  font-family:var(--ff-ui);
  -webkit-tap-highlight-color:transparent;
  transition:all .15s;
}
.ibtn:active{transform:scale(.97);}
.ibtn.on{background:var(--c-active-bg);border-color:var(--c-active-border);color:var(--c-active-text);}
.ibtn .soe{font-size:13px;color:#888;display:block;margin-bottom:3px;}
.ibtn.on .soe{color:#5a82cc;}

/* 説明 */
.desc-box{margin-top:10px;min-height:20px;font-size:14px;color:#777;line-height:1.7;padding:8px 10px;background:#f5f4f0;border-radius:8px;}

/* 名前入力 */
textarea{
  width:100%;border:1.5px solid var(--c-border);border-radius:var(--radius);
  padding:12px;font-family:var(--ff-ui);font-size:18px;
  resize:vertical;min-height:80px;color:#333;background:white;
  line-height:1.6;
}
textarea:focus{outline:none;border-color:var(--c-active-border);}
.hint{font-size:14px;color:var(--c-muted);margin-top:6px;line-height:1.6;}

/* サイズ選択 */
.size-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.sbtn{
  background:#faf9f7;border:1.5px solid var(--c-border);
  border-radius:var(--radius);padding:12px 4px;
  font-size:17px;font-weight:600;cursor:pointer;color:#333;
  text-align:center;font-family:var(--ff-ui);
  -webkit-tap-highlight-color:transparent;transition:all .15s;
}
.sbtn:active{transform:scale(.97);}
.sbtn.on{background:var(--c-active-bg);border-color:var(--c-active-border);color:var(--c-active-text);}

/* 印刷ボタン */
.print-area{margin-top:4px;}
.pbtn{
  width:100%;padding:16px;
  background:#1a56cc;border:none;border-radius:var(--radius);
  font-size:20px;font-weight:700;cursor:pointer;color:white;
  font-family:var(--ff-ui);letter-spacing:0.05em;
  -webkit-tap-highlight-color:transparent;transition:all .15s;
}
.pbtn:active{background:#1244aa;transform:scale(.98);}
.pbtn:disabled{background:#ccc;cursor:not-allowed;transform:none;}
.print-hint{font-size:14px;color:var(--c-muted);margin-top:6px;text-align:center;}

/* 区切り線 */
.divider{border:none;border-top:1px solid var(--c-border);margin:4px 0 20px;}

/* プレビューエリア */
.preview-wrap{position:sticky;top:16px;}
.prev-meta{font-size:14px;color:var(--c-muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
.prev-noshi{font-size:14px;color:#888;}
.prev-box{background:#d8d6d0;border-radius:10px;width:100%;display:flex;align-items:center;justify-content:center;padding:10px;}
.prev-inner{background:white;width:100%;border:1px solid #bbb;border-radius:2px;overflow:hidden;}
.prev-inner svg{width:100%;height:100%;display:block;}

/* ローディング・エラー */
.loading{text-align:center;padding:28px;font-size:16px;color:#aaa;}
.error-msg{font-size:14px;color:#c0392b;padding:10px;background:#fdf0ef;border-radius:8px;margin-top:8px;line-height:1.7;}

@media(max-width:600px){
  .group-grid{grid-template-columns:1fr 1fr;}
  .item-grid{grid-template-columns:1fr 1fr;}
}
@media print{
  @page{size:var(--print-size) landscape;margin:0;}
  html,body{margin:0;padding:0;background:white;}
  body *{visibility:hidden;}
  #pt{visibility:visible;position:fixed;inset:0;background:white;}
  #pt *{visibility:visible;}
  #pt svg{width:100vw;height:100vh;}
}
</style>
</head>
<body>
<div class="page-title">🎁 熨斗メーカー</div>
<div class="layout">

<!-- 左：操作パネル -->
<div class="panel">

  <!-- STEP1 -->
  <div class="step-block active" id="step1-block">
    <div class="step-header">
      <div class="step-badge" id="badge1">1</div>
      <div class="step-title">どんな場面ですか？</div>
    </div>
    <div class="group-grid" id="group-grid">
      <div class="loading" style="grid-column:1/-1">読み込み中...</div>
    </div>
    <div id="load-error"></div>
  </div>
  <hr class="divider">

  <!-- STEP2 -->
  <div class="step-block locked" id="step2-block">
    <div class="step-header">
      <div class="step-badge" id="badge2">2</div>
      <div class="step-title">表書きを選んでください</div>
    </div>
    <div class="item-grid" id="item-grid"></div>
    <div class="desc-box" id="desc-box" style="display:none;"></div>
  </div>
  <hr class="divider">

  <!-- STEP3 名前（ロックなし） -->
  <div class="step-block" id="step3-block">
    <div class="step-header">
      <div class="step-badge" id="badge3">3</div>
      <div class="step-title">贈り主の名前を入力</div>
    </div>
    <textarea id="name" placeholder="例：山田太郎&#10;（連名は1行1名・先に書いた方が右になります）" oninput="render()" rows="3"></textarea>
    <p class="hint">名前なしでも印刷できます／連名は最大3名</p>
  </div>
  <hr class="divider">

  <!-- STEP4 -->
  <div class="step-block" id="step4-block">
    <div class="step-header">
      <div class="step-badge" id="badge4">4</div>
      <div class="step-title">用紙サイズを選んでください</div>
    </div>
    <div class="size-grid">
      <button class="sbtn on" data-s="A3" onclick="pickSize(this)">A3</button>
      <button class="sbtn" data-s="A4" onclick="pickSize(this)">A4</button>
      <button class="sbtn" data-s="B5" onclick="pickSize(this)">B5</button>
    </div>
  </div>
  <hr class="divider">

  <!-- 印刷ボタン -->
  <div class="print-area">
    <button class="pbtn" id="print-btn" onclick="doPrint()" disabled>🖨　印刷する</button>
    <p class="print-hint">印刷ダイアログ → 横向き・余白なし に設定してください</p>
  </div>

</div>

<!-- 右：プレビュー -->
<div class="preview-wrap">
  <div class="prev-meta">
    <span id="prev-size-lbl">プレビュー（A3横）</span>
    <span class="prev-noshi" id="prev-noshi-name"></span>
  </div>
  <div class="prev-box">
    <div class="prev-inner" id="prev-inner" style="aspect-ratio:420/297;">
      <div id="prev"></div>
    </div>
  </div>
</div>

</div><!-- /layout -->
<div id="pt" style="display:none;"></div>

<script>
// ============================================================
// CSV URL & データ
// ============================================================
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSqFm7X3Dk4yZJqSx_SzoGOlCdFzQmOgVorngEKD5pD-cHax7BLGfm_GPmNU8aYslep_FS-jz8F4KJD/pub?gid=0&single=true&output=csv';

// グループ絵文字マッピング
const GROUP_EMOJI={
  '結婚':'💍',
  '出産・入学・卒業':'🌸',
  '長寿・結婚記念':'🎊',
  '快気祝い':'🌿',
  'お見舞い':'💐',
  '弔辞':'🕯️',
};

// ============================================================
// 用紙サイズ（mm・横向き）
// ============================================================
const SIZES={
  A3:{w:420,h:297,label:'A3横',printSize:'A3'},
  A4:{w:297,h:210,label:'A4横',printSize:'A4'},
  B5:{w:257,h:182,label:'B5横',printSize:'B5'},
};
const BASE_W=420,BASE_H=297;

// ============================================================
// 寸法定数（A3基準 mm）
// ============================================================
const O_TOP=20,O_BOTTOM=BASE_H/2-30,O_H=O_BOTTOM-O_TOP;
const N_TOP=BASE_H/2+30,N_BOTTOM=BASE_H-20,N_H=N_BOTTOM-N_TOP;
const O_BASE=22,N_BASE=14;
const SOE_TOP=23,SOE_BASE=11,SOE_GAP=0.10,SOE_OMOTE_GAP=7;
const FF="'Hiragino Mincho ProN W6','HiraMinProN-W6','Hiragino Mincho ProN','HiraMinProN-W3','Noto Serif JP','Yu Mincho','YuMincho',serif";

// ============================================================
// 状態
// ============================================================
let DATA=[],curGroup=null,curItem=null,curSize='A3';

// ============================================================
// CSV読み込み
// ============================================================
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const cols=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>{let v=(cols[i]||'').replace(/^"|"$/g,'').trim();obj[h]=v||null;});
    obj.usumeki=obj.usuzumi==='薄墨';
    return obj;
  }).filter(d=>d.omote);
}

async function loadData(){
  try{
    const res=await fetch(CSV_URL);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    DATA=parseCSV(text);
    buildGroups();
    render();
  }catch(e){
    document.getElementById('group-grid').innerHTML='';
    document.getElementById('load-error').innerHTML=
      '<div class="error-msg">データの読み込みに失敗しました。<br>ネット接続を確認してリロードしてください。<br><small>'+e.message+'</small></div>';
  }
}

// ============================================================
// UI構築
// ============================================================
function buildGroups(){
  const groups=[...new Set(DATA.map(d=>d.group))];
  const grid=document.getElementById('group-grid');
  grid.innerHTML='';
  groups.forEach(g=>{
    const b=document.createElement('button');
    b.className='gbtn';b.dataset.g=g;
    const emoji=GROUP_EMOJI[g]||'📋';
    b.innerHTML=`<span class="emoji">${emoji}</span>${g}`;
    b.onclick=function(){pickGroup(this);};
    grid.appendChild(b);
  });
}

function pickGroup(btn){
  document.querySelectorAll('.gbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curGroup=btn.dataset.g;curItem=null;

  // step1 done
  document.getElementById('step1-block').classList.remove('active');
  document.getElementById('step1-block').classList.add('done');
  document.getElementById('badge1').textContent='✓';

  // step2 unlock & build
  const s2=document.getElementById('step2-block');
  s2.classList.remove('locked');s2.classList.add('active');
  document.getElementById('badge2').textContent='2';

  const grid=document.getElementById('item-grid');
  grid.innerHTML='';
  const db=document.getElementById('desc-box');
  db.style.display='none';db.textContent='';

  DATA.filter(d=>d.group===curGroup).forEach(d=>{
    const b=document.createElement('button');
    b.className='ibtn';b.dataset.idx=DATA.indexOf(d);
    b.innerHTML=d.soe?`<span class="soe">${d.soe}</span>${d.omote}`:d.omote;
    b.onclick=function(){pickItem(this);};
    grid.appendChild(b);
  });

  document.getElementById('print-btn').disabled=true;
  document.getElementById('prev-noshi-name').textContent='';
  render();
}

function pickItem(btn){
  document.querySelectorAll('.ibtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curItem=DATA[parseInt(btn.dataset.idx)];

  const db=document.getElementById('desc-box');
  if(curItem.desc){db.textContent=curItem.desc;db.style.display='';}
  else{db.style.display='none';}

  // step2 done
  document.getElementById('step2-block').classList.remove('active');
  document.getElementById('step2-block').classList.add('done');
  document.getElementById('badge2').textContent='✓';

  document.getElementById('print-btn').disabled=false;
  document.getElementById('prev-noshi-name').textContent=curItem.noshi||'';
  render();
}

function pickSize(btn){
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');curSize=btn.dataset.s;
  document.getElementById('prev-inner').style.aspectRatio=SIZES[curSize].w+'/'+SIZES[curSize].h;
  document.getElementById('prev-size-lbl').textContent='プレビュー（'+SIZES[curSize].label+'）';
  render();
}

// ============================================================
// 字間・縦配置
// ============================================================
function getGap(n){if(n<=1)return 0;if(n===2)return 0.35;if(n===3)return 0.20;return 0.10;}
function calcVert(n,baseFs,availH){
  const step=1+getGap(n);let fs=baseFs,totalH=fs*(1+(n-1)*step);
  if(totalH>availH){fs=availH/(1+(n-1)*step);totalH=availH;}
  return{fs,step,totalH};
}
function calcSoeVert(n,baseFs,availH){
  const step=1+SOE_GAP;let fs=baseFs,totalH=fs*(1+(n-1)*step);
  if(totalH>availH){fs=availH/(1+(n-1)*step);totalH=availH;}
  return{fs,step,totalH};
}

// ============================================================
// SVG生成
// ============================================================
function makeSVG(w,h){
  const scaleX=w/BASE_W,scaleY=h/BASE_H;
  const ink=(curItem&&curItem.usumeki)?'#888888':'#111111';
  const nameRaw=document.getElementById('name').value.trim();
  const names=nameRaw?nameRaw.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,3):[];

  let els=`<rect width="${w}" height="${h}" fill="white"/>`;

  if(curItem&&curItem.img){
    els+=`<image href="${curItem.img}.jpg" x="0" y="0" width="${w}" height="${h}" preserveAspectRatio="xMidYMid slice"/>`;
  }
  if(!curItem)return`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${els}</svg>`;

  // 表書き（水平センター）
  const oChars=curItem.omote.split('');
  const{fs:oFs,step:oStep,totalH:oTotalH}=calcVert(oChars.length,O_BASE,O_H);
  const oStartY=(O_TOP+O_BOTTOM)/2-oTotalH/2;
  const omoteX=BASE_W/2;
  oChars.forEach((c,i)=>{
    const ymm=oStartY+oFs*0.85+i*oFs*oStep;
    els+=`<text x="${omoteX*scaleX}" y="${ymm*scaleY}" text-anchor="middle" font-size="${oFs*scaleY}" font-weight="700" font-family="${FF}" fill="${ink}">${c}</text>`;
  });

  // 添え文字（表書きの右7mm）
  if(curItem.soe){
    const soeChars=curItem.soe.split('');
    const{fs:sFs,step:sSp}=calcSoeVert(soeChars.length,SOE_BASE,BASE_H-SOE_TOP-20);
    const soeX=omoteX+oFs/2+SOE_OMOTE_GAP+sFs/2;
    soeChars.forEach((c,i)=>{
      const ymm=SOE_TOP+sFs*0.85+i*sFs*sSp;
      els+=`<text x="${soeX*scaleX}" y="${ymm*scaleY}" text-anchor="middle" font-size="${sFs*scaleY}" font-weight="700" font-family="${FF}" fill="${ink}">${c}</text>`;
    });
  }

  // 名前
  if(names.length>0){
    const maxLen=Math.max(...names.map(n=>n.length));
    const{fs:nFs,step:nStep,totalH:nTotalH}=calcVert(maxLen,N_BASE,N_H);
    const nStartY=(N_TOP+N_BOTTOM)/2-nTotalH/2;
    const colGap=nFs*1.6;
    const rightmostX=BASE_W/2+(names.length-1)*colGap/2;
    names.forEach((name,ci)=>{
      const colXmm=rightmostX-ci*colGap;
      name.split('').forEach((nc,ni)=>{
        const ymm=nStartY+nFs*0.85+ni*nFs*nStep;
        els+=`<text x="${colXmm*scaleX}" y="${ymm*scaleY}" text-anchor="middle" font-size="${nFs*scaleY}" font-weight="700" font-family="${FF}" fill="${ink}">${nc}</text>`;
      });
    });
  }
  return`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${els}</svg>`;
}

// ============================================================
// 描画・印刷
// ============================================================
function render(){
  const s=SIZES[curSize];
  document.getElementById('prev').innerHTML=makeSVG(s.w,s.h);
}
function doPrint(){
  const s=SIZES[curSize];
  const PPI=300,MPI=25.4;
  const pw=Math.round(s.w/MPI*PPI),ph=Math.round(s.h/MPI*PPI);
  document.documentElement.style.setProperty('--print-size',s.printSize);
  const pt=document.getElementById('pt');
  pt.style.display='block';
  pt.innerHTML=makeSVG(pw,ph);
  setTimeout(()=>{window.print();setTimeout(()=>{pt.style.display='none';},2000);},200);
}

// ============================================================
// 初期化
// ============================================================
document.fonts.ready.then(()=>{loadData();});
</script>
</body>
</html>
